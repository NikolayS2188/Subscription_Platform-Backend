spring:
  application:
    name: subscription-platform

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/subscription_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    com.platform: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: INFO
    org.hibernate: WARN
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

business:
  sse:
    timeout: ${SSE_TIMEOUT:60000}
  upcoming:
    default-days: ${UPCOMING_DEFAULT_DAYS:7}
  lazy-expiry:
    enabled: ${LAZY_EXPIRY_ENABLED:true}